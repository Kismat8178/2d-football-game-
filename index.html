<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LapBall - Advanced Human Evolution Engine</title>
    
    <!-- Modern Firebase Realtime Database Compat Dependency -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* =========================================================================
           GLOBAL SETUP AND INTERFACE STYLING
           ========================================================================= */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c100d;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2820 0%, #080c09 100%);
            color: white;
            z-index: 100;
            padding: 20px;
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 25px;
            color: #2ecc71;
            font-style: italic;
            text-align: center;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffffff;
            text-align: center;
        }

        .menu-container {
            background: rgba(20, 30, 24, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(46, 204, 113, 0.25);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .menu-container::-webkit-scrollbar { width: 8px; }
        .menu-container::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 4px; }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.5);
            padding: 14px 22px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }

        .form-row:hover {
            border-color: rgba(46, 204, 113, 0.4);
            background: rgba(0, 0, 0, 0.6);
        }

        .form-row label {
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ecf0f1;
        }

        select, input[type="text"], input[type="checkbox"], input[type="number"], .net-input {
            background: #1e2b24;
            color: white;
            border: 1px solid #2ecc71;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            width: 190px;
            outline: none;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        input[type="text"], input[type="number"] { cursor: text; }

        select:focus, input[type="text"]:focus, input[type="number"]:focus, .net-input:focus {
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        .btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(39, 174, 96, 0.4);
            transition: all 0.15s ease;
            letter-spacing: 1px;
        }

        .btn.secondary {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .btn:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(0,0,0, 0.3); }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; transform: none; box-shadow: none; }

        /* =========================================================================
           GAME FIELD DISPLAY AND HUD OVERLAYS
           ========================================================================= */
        #game-container { position: relative; width: 100%; height: 100%; background-color: #111a13; }
        
        #top-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background-color: #0c100d; border-bottom: 2px solid rgba(46, 204, 113, 0.3);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); gap: 15px;
        }
        
        #game-area { position: absolute; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: optimizeSpeed; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .interactive { pointer-events: auto; }

        .scoreboard {
            background: rgba(10, 18, 14, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 5px 15px; border-radius: 30px; display: flex; align-items: center; gap: 12px;
            font-family: 'Courier New', Courier, monospace; font-size: 1.1rem; font-weight: 900;
            border: 2px solid rgba(46, 204, 113, 0.3); color: #ffffff; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        .team-indicator { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin: 0 4px; border: 2px solid rgba(255,255,255,0.5); }
        
        .hud-side-btn {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; display: flex; justify-content: center; align-items: center; transition: all 0.2s; pointer-events: auto;
        }
        .hud-side-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
        
        #chat-notification {
            position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: #e74c3c; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        /* Post Match Stats Table */
        .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; color: #ecf0f1; font-size: 0.95rem; }
        .stats-table th, .stats-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .stats-table th { color: #2ecc71; text-transform: uppercase; font-size: 0.80rem; }
        .stats-container { max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .stats-container::-webkit-scrollbar { width: 6px; }
        .stats-container::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 3px; }

        /* Firebase Live Chat */
        #chat-container {
            position: absolute; top: 15px; right: 15px; width: 280px; z-index: 200;
            background: rgba(10, 15, 12, 0.85); border-radius: 12px; padding: 12px; pointer-events: auto;
            display: flex; flex-direction: column; backdrop-filter: blur(6px); border: 1px solid rgba(46,204,113,0.5);
        }
        #chat-log { max-height: 120px; overflow-y: auto; font-size: 0.85rem; color: #ecf0f1; margin-bottom: 8px; text-shadow: 1px 1px 2px #000; display: flex; flex-direction: column; gap: 5px; }
        #chat-log::-webkit-scrollbar { width: 4px; }
        #chat-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
        #chat-input-row { display: flex; gap: 6px; }
        #chat-input { flex-grow: 1; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(46,204,113,0.5); border-radius: 6px; padding: 8px; outline: none; font-size: 0.85rem; user-select: auto; -webkit-user-select: auto; }
        #chat-send { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: #fff; border: none; border-radius: 6px; padding: 0 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        /* Dynamic Controls */
        #controls-container { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; position: absolute; bottom: 15px; left: 0; padding: 0 20px; z-index: 50; }
        #joystick-zone { width: 120px; height: 120px; position: relative; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius: 50%; }
        #joystick-base { width: 90px; height: 90px; background: rgba(20, 30, 24, 0.4); border: 2px solid rgba(46, 204, 113, 0.3); border-radius: 50%; position: absolute; top: 15px; left: 15px; backdrop-filter: blur(5px); }
        #joystick-stick { width: 40px; height: 40px; background: linear-gradient(135deg, #ecf0f1 0%, #bdc3c7 100%); border-radius: 50%; position: absolute; top: 40px; left: 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 -4px 8px rgba(0,0,0,0.2); border: 2px solid #ffffff; }
        #action-buttons { display: flex; gap: 12px; }
        
        .action-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3); color: white; font-weight: 900; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: rgba(0, 0, 0, 0.5); box-shadow: 0 8px 20px rgba(0,0,0,0.4); backdrop-filter: blur(5px); text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #btn-dash { background: radial-gradient(circle, rgba(41, 128, 185, 0.9) 0%, rgba(31, 97, 141, 0.9) 100%); }
        #btn-shoot { background: radial-gradient(circle, rgba(230, 126, 34, 0.9) 0%, rgba(211, 84, 0, 0.9) 100%); width: 65px; height: 65px; font-size: 0.85rem; border-color: rgba(243, 156, 18, 0.6); }
        #btn-power { background: radial-gradient(circle, rgba(231, 76, 60, 0.9) 0%, rgba(192, 57, 43, 0.9) 100%); }
        .cooldown-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(0, 0, 0, 0.8); transition: height 0.1s linear; }
        
        #spectator-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 200; }

        @media (max-width: 700px) or (orientation: portrait) {
            #controls-container { bottom: 10px; padding: 0 10px; }
            #joystick-zone { width: 100px; height: 100px; transform: none; }
            #joystick-base { width: 70px; height: 70px; top: 15px; left: 15px; }
            #joystick-stick { width: 34px; height: 34px; top: 33px; left: 33px; }
            
            .action-btn { width: 45px; height: 45px; font-size: 0.65rem; }
            #btn-shoot { width: 55px; height: 55px; font-size: 0.75rem; }
            
            #chat-container { width: 220px; right: 10px; }
            #spectator-ui button { font-size: 0.9rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <!-- MAIN WRAPPER MENU -->
    <div id="main-menu" class="screen">
        <h1>LAPBALL</h1>
        <h2>Human Evolution Engine</h2>
        
        <!-- INITIAL SELECTION MENU -->
        <div id="ui-initial" class="menu-container">
            <button id="btn-goto-sp" class="btn">Single Player</button>
            <button id="btn-goto-mp" class="btn" style="background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);">Multi Player</button>
            <button id="fullscreen-btn" class="btn secondary" style="margin-top: 30px;">Toggle Fullscreen</button>
        </div>

        <!-- SINGLE PLAYER MENU -->
        <div id="ui-sp" class="menu-container hidden">
            <h2 style="color:#2ecc71;">Single Player</h2>
            <div class="form-row">
                <label>Select Size Field</label>
                <select id="sp-field-size">
                    <option value="tiny">Tiny</option>
                    <option value="medium" selected>Medium</option>
                    <option value="large">Large</option>
                </select>
            </div>
            <div class="form-row">
                <label>Choose Difficulty</label>
                <select id="sp-difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Normal</option>
                    <option value="hard">Hard</option>
                    <option value="legendary">V. Hard</option>
                </select>
            </div>
            <div class="form-row">
                <label>Team Size</label>
                <select id="sp-team-size">
                    <option value="3">3v3</option>
                    <option value="5" selected>5v5</option>
                    <option value="7">7v7</option>
                    <option value="8">8v8</option>
                    <option value="11">11v11</option>
                </select>
            </div>
            <div class="form-row">
                <label>Your Country</label>
                <select id="sp-p1-team"></select>
            </div>
            <div class="form-row">
                <label>Opponent Country</label>
                <select id="sp-p2-team"></select>
            </div>
            <div class="form-row">
                <label>Your Position</label>
                <select id="sp-role">
                    <option value="forward">Forward (ST)</option>
                    <option value="winger">Winger</option>
                    <option value="midfielder" selected>Midfielder (CM)</option>
                    <option value="defender">Defender (CD)</option>
                    <option value="goalie">Goalkeeper (GK)</option>
                    <option value="spectator">Spectator (Watch)</option>
                </select>
            </div>
            <div class="form-row">
                <label>Match Time</label>
                <select id="sp-time-limit">
                    <option value="300">5 Minutes</option>
                    <option value="600">10 Minutes</option>
                    <option value="900" selected>15 Minutes</option>
                    <option value="1200">20 Minutes</option>
                    <option value="2400">40 Minutes</option>
                    <option value="5400">90 Minutes</option>
                </select>
            </div>
            
            <button id="btn-start-sp" class="btn">Start Match</button>
            <button id="btn-back-sp" class="btn secondary">Back</button>
        </div>

        <!-- MULTI PLAYER MENU -->
        <div id="ui-mp" class="menu-container hidden">
            <h2 style="color:#8e44ad;">Multi Player</h2>
            <div class="form-row">
                <label>Select Name</label>
                <input type="text" id="mp-name" placeholder="Enter Name" maxlength="12" value="Player" />
            </div>
            <div class="form-row">
                <label>Select Mode</label>
                <select id="mp-team-size">
                    <option value="1">1v1</option>
                    <option value="2">2v2</option>
                    <option value="5" selected>5v5</option>
                    <option value="7">7v7</option>
                    <option value="11">11v11</option>
                </select>
            </div>
            <div class="form-row">
                <label>Select Map Size</label>
                <select id="mp-field-size">
                    <option value="tiny">Tiny</option>
                    <option value="medium" selected>Medium</option>
                    <option value="large">Large</option>
                </select>
            </div>
            <div class="form-row" id="mp-bot-row">
                <label>Number of Bots</label>
                <select id="mp-bot-count">
                    <option value="auto" selected>Auto Fill</option>
                    <option value="0">0 Bots</option>
                    <option value="1">1 Bot</option>
                    <option value="2">2 Bots</option>
                    <option value="3">3 Bots</option>
                    <option value="4">4 Bots</option>
                </select>
            </div>
            <div class="form-row">
                <label>Your Country</label>
                <select id="mp-p1-team"></select>
            </div>
            <div class="form-row">
                <label>Your Position</label>
                <select id="mp-role">
                    <option value="forward">Forward (ST)</option>
                    <option value="winger">Winger</option>
                    <option value="midfielder" selected>Midfielder (CM)</option>
                    <option value="defender">Defender (CD)</option>
                    <option value="goalie">Goalkeeper (GK)</option>
                    <option value="spectator">Spectator (Watch)</option>
                </select>
            </div>
            <div class="form-row">
                <label>Match Time</label>
                <select id="mp-time-limit">
                    <option value="300">5 Minutes</option>
                    <option value="600">10 Minutes</option>
                    <option value="900" selected>15 Minutes</option>
                    <option value="1200">20 Minutes</option>
                    <option value="2400">40 Minutes</option>
                    <option value="5400">90 Minutes</option>
                </select>
            </div>
            
            <div class="form-row" style="background: transparent; border: none; padding: 0; margin-top: 15px;">
                <button id="btn-create-room" class="btn" style="margin-top: 0; width: 48%; font-size: 1rem; padding: 14px; background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);">Create Room</button>
                <button id="btn-join-room" class="btn" style="margin-top: 0; width: 48%; font-size: 1rem; padding: 14px; background: linear-gradient(135deg, #2980b9 0%, #3498db 100%);">Join Room</button>
            </div>
            <div class="form-row">
                <input type="text" id="input-room-id" class="net-input" placeholder="6-Digit ID" style="width: 100%; text-align: center; font-family: monospace; font-size: 1.15rem; letter-spacing: 2px;" />
            </div>
            <div id="mp-status" style="text-align: center; color: #bdc3c7; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">
                Ready to connect
            </div>
            <button id="btn-back-mp" class="btn secondary">Back</button>
        </div>
    </div>

    <!-- PAUSE SCREEN -->
    <div id="pause-screen" class="screen hidden" style="background: rgba(5,10,7,0.95); z-index: 105; backdrop-filter: blur(10px);">
        <div class="menu-container" style="text-align: center; border-color: rgba(231, 76, 60, 0.4);">
            <h2 style="margin-bottom: 25px; color: #e74c3c;">Simulation Suspended</h2>
            <button id="resume-btn" class="btn" style="background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%); margin-bottom: 15px;">Return to Match</button>
            <button id="quit-btn" class="btn" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);">Terminate Game</button>
        </div>
    </div>
    
    <!-- HOST DISCONNECT SCREEN -->
    <div id="host-left-screen" class="screen hidden" style="background: rgba(5,10,7,0.95); z-index: 999; backdrop-filter: blur(10px);">
        <div class="menu-container" style="text-align: center; border-color: rgba(231, 76, 60, 0.4);">
            <h2 style="margin-bottom: 25px; color: #e74c3c;">Connection Terminated</h2>
            <p style="margin-bottom: 25px; font-size: 1.1rem; color: #ecf0f1;">Host left the game. Room closed.</p>
            <button id="btn-host-left-ok" class="btn" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);">Return to Menu</button>
        </div>
    </div>

    <!-- POST MATCH STATS SCREEN -->
    <div id="post-match-screen" class="screen hidden" style="background: rgba(10,15,12,0.95); z-index: 110; backdrop-filter: blur(15px);">
        <div class="menu-container" style="max-width: 650px;">
            <h1 id="post-match-title" style="margin-bottom: 10px;">MATCH OVER</h1>
            <h2 id="post-match-score" style="margin-bottom: 20px; font-size: 2rem;">0 - 0</h2>
            
            <div class="stats-container">
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>Player Name</th>
                            <th>Team</th>
                            <th>Goals</th>
                        </tr>
                    </thead>
                    <tbody id="stats-tbody">
                        <!-- Populated Dynamically -->
                    </tbody>
                </table>
            </div>

            <div style="display:flex; gap: 15px; margin-top: 15px;">
                <button id="rematch-btn" class="btn" style="margin-top:0;">Rematch</button>
                <button id="postmatch-quit-btn" class="btn secondary" style="margin-top:0;">Back to Menu</button>
            </div>
        </div>
    </div>

    <!-- MAIN GAME RENDER CONTAINER -->
    <div id="game-container" class="hidden">
        <div id="top-header">
            <!-- Fullscreen Toggle left of scoreboard -->
            <button id="hud-fullscreen-btn" class="hud-side-btn">⛶</button>
            
            <div class="scoreboard interactive">
                <button id="pause-btn" class="hud-side-btn" style="width:28px; height:28px; font-size:0.8rem; border:none; background:rgba(255,255,255,0.2);">||</button>
                <div>
                    <span id="hud-p1-flag" class="team-indicator"></span>
                    <span id="hud-p1-score">0</span>
                </div>
                <div id="hud-timer" style="color: #f1c40f;">00:00</div>
                <div>
                    <span id="hud-p2-score">0</span>
                    <span id="hud-p2-flag" class="team-indicator"></span>
                </div>
            </div>
            
            <!-- Chat Toggle right of scoreboard -->
            <div style="position: relative;" class="interactive">
                <button id="hud-chat-toggle-btn" class="hud-side-btn">💬</button>
                <div id="chat-notification" class="hidden"></div>
            </div>
        </div>
        
        <div id="game-area">
            <canvas id="gameCanvas"></canvas>
            <div id="ui-layer">
                
                <div id="chat-container" class="hidden">
                    <div id="chat-log"></div>
                    <div id="chat-input-row">
                        <input type="text" id="chat-input" placeholder="Type message..." autocomplete="off" maxlength="100"/>
                        <button id="chat-send">Send</button>
                    </div>
                </div>
                
                <div id="spectator-ui" class="hidden interactive">
                    <button id="spectator-cam-btn" class="btn" style="background: rgba(46,204,113,0.8); backdrop-filter: blur(5px); padding: 12px 25px; border-radius: 30px; font-size: 1.1rem; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: auto;">Cam: Follow Ball</button>
                </div>

                <div id="controls-container">
                    <div id="joystick-zone" class="interactive">
                        <div id="joystick-base"></div>
                        <div id="joystick-stick"></div>
                    </div>
                    
                    <div id="action-buttons" class="interactive">
                        <div id="btn-dash" class="action-btn">
                            <span>DASH</span>
                            <div id="cooldown-dash" class="cooldown-overlay"></div>
                        </div>
                        <div id="btn-shoot" class="action-btn">
                            <span>KICK</span>
                        </div>
                        <div id="btn-power" class="action-btn">
                            <span>POWER</span>
                            <div id="cooldown-power" class="cooldown-overlay"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* =========================================================================
           FIREBASE REALTIME DATABASE INITIALIZATION
           ========================================================================= */
        const firebaseConfig = {
            apiKey: "AIzaSyCtjyvXA2LEhHrQ34m-iYovP0Mmm8VSZX0",
            authDomain: "lapball-4e275.firebaseapp.com",
            databaseURL: "https://lapball-4e275-default-rtdb.firebaseio.com",
            projectId: "lapball-4e275",

        class Disc {
            constructor(x, y, radius, friction, color, isBall = false) {
                this.x = x; this.y = y; this.targetX = x; this.targetY = y;
                this.vx = 0; this.vy = 0; this.radius = radius;
                this.mass = isBall ? 0.38 : 1.35; this.friction = friction;
                this.color = color; this.isBall = isBall;
                this.lastTouch = null;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vx *= this.friction; this.vy *= this.friction; }
        }

        class Player extends Disc {
            constructor(x, y, team, teamId, isAI, role, homeX, homeY, playerName) {
                super(x, y, 20, 0.82, team.bg);
                this.teamConfig = team; this.teamId = teamId;
                this.isAI = isAI; this.isLocalHuman = false;
                this.role = role; this.homeX = homeX; this.homeY = homeY;
                this.speed = 0.52;
                
                this.playerName = playerName || (isAI ? `Bot_${Math.floor(Math.random()*90 + 10)}` : "Player");
                this.stats = { goals: 0 };

                this.reactionBuffer = []; this.targetMemoryX = x; this.targetMemoryY = y;
                this.patienceTicks = Math.random() * 60; this.intelligenceRating = Math.random() * 0.4 + 0.6; 
                this.stamina = 1.0; this.currentIntention = "positioning"; this.kickCooldown = 0;       
            }
        }

        function buildTacticalLineups() {
            players = []; scores = { p1: 0, p2: 0 }; matchTimer = 0; powerShotActive = false;

            if (CONFIG.fieldSize === "tiny") { map.width = 1200; map.height = 750; }
            else if (CONFIG.fieldSize === "large") { map.width = 2400; map.height = 1450; }
            else { map.width = 1800; map.height = 1100; }
            
            map.goalY1 = map.height / 2 - 130; map.goalY2 = map.height / 2 + 130;

            let size = CONFIG.teamSize;
            let spawnLimit = size; 

            // Implement specific Bot Count if selected in Multiplayer (modes <= 2)
            if (isMultiplayer && CONFIG.botCountSetting !== "auto" && size <= 4) {
                spawnLimit = parseInt(CONFIG.botCountSetting) + 1; // +1 to account for the human host slot
            }

            let getRolesForSize = (s) => {
                if (s === 1) return ["forward"];
                if (s === 2) return ["goalie", "forward"];
                if (s === 3) return ["goalie", "defender", "forward"];
                if (s === 5) return ["goalie", "defender", "midfielder", "winger", "forward"];
                if (s === 7) return ["goalie", "defender", "defender", "midfielder", "midfielder", "winger", "forward"];
                if (s === 8) return ["goalie", "defender", "defender", "midfielder", "midfielder", "winger", "winger", "forward"];
                if (s === 11) return ["goalie", "defender", "defender", "defender", "defender", "midfielder", "midfielder", "midfielder", "winger", "winger", "forward"];
                return ["forward"];
            };

            // TEAM 1 SETUP (Host/SP)
            let r1 = getRolesForSize(size);
            if (CONFIG.p1Role !== "spectator") {
                let idx = r1.indexOf(CONFIG.p1Role);
                if (idx !== -1) { r1[idx] = r1[size - 1]; r1[size - 1] = CONFIG.p1Role; }
                else r1[size - 1] = CONFIG.p1Role;
            }

            for (let i = 0; i < spawnLimit; i++) {
                let currentRole = r1[i];
                let isUserNode = (CONFIG.p1Role !== "spectator" && i === size - 1); 
                let spatialRatioX = (currentRole === "goalie") ? 0.05 : (currentRole === "defender") ? 0.20 : (currentRole === "midfielder") ? 0.40 : (currentRole === "winger") ? 0.45 : 0.48;
                let lateralRatioY = (currentRole === "goalie") ? 0.5 : (0.2 + (i/size) * 0.6);
                let homeX = map.width * spatialRatioX; let homeY = map.height * lateralRatioY;
                
                let pName = isUserNode ? CONFIG.p1Name : `Bot_${Math.floor(10 + Math.random()*89)}`;
                let p = new Player(homeX, homeY, CONFIG.p1Team, 1, !isUserNode, currentRole, homeX, homeY, pName);
                p.isLocalHuman = isUserNode && isHost;
                if (isUserNode) p.clientId = "host";
                players.push(p);
            }

            // TEAM 2 SETUP (AI Bots awaiting clients)
            let r2 = getRolesForSize(size);
            for (let i = 0; i < spawnLimit; i++) {
                let currentRole = r2[i];
                let spatialRatioX = (currentRole === "goalie") ? 0.95 : (currentRole === "defender") ? 0.80 : (currentRole === "midfielder") ? 0.60 : (currentRole === "winger") ? 0.55 : 0.52;
                let lateralRatioY = (currentRole === "goalie") ? 0.5 : (0.2 + (i/size) * 0.6);
                let homeX = map.width * spatialRatioX; let homeY = map.height * lateralRatioY;
                
                let pName = `Bot_${Math.floor(10 + Math.random()*89)}`;
                let p = new Player(homeX, homeY, CONFIG.p2Team, 2, true, currentRole, homeX, homeY, pName);
                players.push(p);
            }

            ball = new Disc(map.width / 2, map.height / 2, 12, 0.985, "#ffffff", true); 
        }

        /* AI LOGIC */
        function executeHumanizedAI() {
            let frameReactionDelay = CONFIG.difficulty === "easy" ? 20 : (CONFIG.difficulty === "medium" ? 12 : (CONFIG.difficulty === "hard" ? 6 : 2));
            let speedMod = CONFIG.difficulty === "easy" ? 0.35 : (CONFIG.difficulty === "medium" ? 0.45 : 0.55);
            let closestTeam1Player = null, minDistanceTeam1 = Infinity;
            let closestTeam2Player = null, minDistanceTeam2 = Infinity;

            players.forEach(p => {
                let distanceToBall = Math.hypot(ball.x - p.x, ball.y - p.y);
                if (p.teamId === 1 && p.role !== "goalie" && distanceToBall < minDistanceTeam1) { minDistanceTeam1 = distanceToBall; closestTeam1Player = p; }
                if (p.teamId === 2 && p.role !== "goalie" && distanceToBall < minDistanceTeam2) { minDistanceTeam2 = distanceToBall; closestTeam2Player = p; }
            });

            let possessionId = (minDistanceTeam1 < minDistanceTeam2) ? 1 : 2;

            players.forEach(p => {
                if (p.kickCooldown > 0) p.kickCooldown--;
                if (!p.isAI) return;

                p.reactionBuffer.push({ x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy });
                if (p.reactionBuffer.length > frameReactionDelay) {
                    let perceivedState = p.reactionBuffer.shift();
                    if (Math.random() > p.intelligenceRating) { perceivedState.x += (Math.random() - 0.5) * 35; perceivedState.y += (Math.random() - 0.5) * 35; }
                    p.targetMemoryX = perceivedState.x; p.targetMemoryY = perceivedState.y;
                }

                let moveTargetX = p.homeX; let moveTargetY = p.homeY;
                let isAssignedChaser = (p.teamId === 1 && p === closestTeam1Player) || (p.teamId === 2 && p === closestTeam2Player);
                let targetGoalX = p.teamId === 1 ? map.width : 0; let targetGoalY = map.height / 2;
                
                let angleToBall = Math.atan2(ball.y - p.y, ball.x - p.x);
                let angleToGoal = Math.atan2(targetGoalY - ball.y, targetGoalX - ball.x);
                let angleDiff = Math.abs(angleToBall - angleToGoal);
                if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
                let isBehindBall = angleDiff < (Math.PI / 2.2); 

                if (p.role === "goalie") {
                    let baseLineGoalX = p.teamId === 1 ? map.width * 0.04 : map.width * 0.96;
                    moveTargetX = baseLineGoalX; moveTargetY = Math.max(map.goalY1 - 20, Math.min(map.goalY2 + 20, p.targetMemoryY));
                    let enterDangerZone = p.teamId === 1 ? (p.targetMemoryX < map.width * 0.20) : (p.targetMemoryX > map.width * 0.80);
                    if (enterDangerZone && Math.abs(p.targetMemoryY - map.height/2) < (map.goalY2 - map.goalY1 + 50)) { moveTargetX = p.targetMemoryX; moveTargetY = p.targetMemoryY; }
                } else {
                    if (isAssignedChaser) {
                        if (isBehindBall) { moveTargetX = p.targetMemoryX; moveTargetY = p.targetMemoryY; } 
                        else {
                            let wrapDist = p.radius + ball.radius + 35; 
                            let wrapTargetX = ball.x - Math.cos(angleToGoal) * wrapDist;
                            let wrapTargetY = ball.y - Math.sin(angleToGoal) * wrapDist;
                            if (Math.hypot(wrapTargetX - p.x, wrapTargetY - p.y) < 40) { moveTargetX = ball.x; moveTargetY = ball.y; } 
                            else {
                                let crossProd = Math.cos(angleToBall) * Math.sin(angleToGoal) - Math.sin(angleToBall) * Math.cos(angleToGoal);
                                let swingMagnitude = 70;
                                if (crossProd > 0) { moveTargetX = wrapTargetX - Math.sin(angleToGoal) * swingMagnitude; moveTargetY = wrapTargetY + Math.cos(angleToGoal) * swingMagnitude; } 
                                else { moveTargetX = wrapTargetX + Math.sin(angleToGoal) * swingMagnitude; moveTargetY = wrapTargetY - Math.cos(angleToGoal) * swingMagnitude; }
                            }
                        }
                        p.stamina -= 0.0006; if (p.stamina < 0.25) speedMod *= 0.65; 
                    } else {
                        if (p.stamina < 1.0) p.stamina += 0.001;
                        let pushOffset = (p.teamId === possessionId ? 250 : -150) * (p.teamId === 1 ? 1 : -1);
                        if (p.role === "defender") { moveTargetX = p.homeX + pushOffset * 0.4 + (ball.x - map.width/2) * 0.2; moveTargetY = p.homeY + (ball.y - map.height/2) * 0.3; } 
                        else if (p.role === "midfielder") { moveTargetX = p.homeX + pushOffset * 0.7 + (ball.x - map.width/2) * 0.4; moveTargetY = p.homeY + (ball.y - map.height/2) * 0.5; } 
                        else if (p.role === "winger") { moveTargetX = p.homeX + pushOffset * 0.85 + (ball.x - map.width/2) * 0.3; moveTargetY = p.homeY + (ball.y - map.height/2) * 0.65; } 
                        else if (p.role === "forward") { moveTargetX = p.homeX + pushOffset * 1.0 + (ball.x - map.width/2) * 0.1; moveTargetY = p.homeY + (ball.y - map.height/2) * 0.4; }
                    }
                }

                let dx = moveTargetX - p.x; let dy = moveTargetY - p.y; let dist = Math.hypot(dx, dy);
                if (dist > 5) { p.vx += (dx / dist) * speedMod; p.vy += (dy / dist) * speedMod; }

                if (Math.hypot(ball.x - p.x, ball.y - p.y) < p.radius + ball.radius + 15 && p.kickCooldown <= 0) {
                    if (isBehindBall || p.role === "goalie") {
                        targetGoalY += (Math.random() - 0.5) * 120; 
                        let shouldPass = (Math.hypot(targetGoalX - ball.x, targetGoalY - ball.y) > map.width * 0.4) && (Math.random() < p.intelligenceRating);
                        if (shouldPass) {
                            let bestPassTarget = null; let maxPassCloseness = -Infinity;
                            players.forEach(teammate => {
                                if (teammate.teamId === p.teamId && teammate !== p && teammate.role !== "goalie") {
                                    let scoreValue = p.teamId === 1 ? teammate.x : (map.width - teammate.x);
                                    if (scoreValue > maxPassCloseness) { maxPassCloseness = scoreValue; bestPassTarget = teammate; }
                                }
                            });
                            if (bestPassTarget) {
                                let pDx = bestPassTarget.x - ball.x; let pDy = bestPassTarget.y - ball.y; let pLen = Math.hypot(pDx, pDy);
                                let passAngleDiff = Math.abs(angleToBall - Math.atan2(pDy, pDx));
                                if (passAngleDiff > Math.PI) passAngleDiff = 2 * Math.PI - passAngleDiff;
                                if (passAngleDiff < Math.PI / 2.0 || p.role === "goalie") { ball.vx = (pDx / pLen) * 9.5 + p.vx * 0.25; ball.vy = (pDy / pLen) * 9.5 + p.vy * 0.25; p.kickCooldown = 30; }
                            } else { executeClearanceKick(p, targetGoalX, targetGoalY); }
                        } else { executeClearanceKick(p, targetGoalX, targetGoalY); }
                    }
                }
            });
        }
        function executeClearanceKick(player, gX, gY) {
            let kDx = gX - ball.x; let kDy = gY - ball.y; let kLen = Math.hypot(kDx, kDy);
            let strikeForce = (CONFIG.difficulty === "hard" && Math.random() < 0.3) ? 14.0 : (8.5 + Math.random() * 4.5);
            ball.vx = (kDx / kLen) * strikeForce + player.vx * 0.4; ball.vy = (kDy / kLen) * strikeForce + player.vy * 0.4; player.kickCooldown = 40;
        }

        /* PHYSICS & RESOLUTIONS */
        function resolveComplexCollisions() {
            for (let i = 0; i < players.length; i++) {
                for (let j = i + 1; j < players.length; j++) { checkAndResolveCirclePhysics(players[i], players[j]); }
            }
            players.forEach(p => {
                if (checkAndResolveCirclePhysics(p, ball)) {
                    if (!p.isAI) {
                        let localIsPower = p.powerShotActive || (p.isLocalHuman && powerShotActive);
                        let localIsKick = p.kickIntent || (p.isLocalHuman && kickIntent);
                        let dx = ball.x - p.x; let dy = ball.y - p.y; let len = Math.hypot(dx, dy);
                        
                        if (localIsPower) { ball.vx = (dx / len) * 22.0; ball.vy = (dy / len) * 22.0; if(p.isLocalHuman) powerShotActive = false; else p.powerShotActive = false; }
                        else if (localIsKick) { ball.vx = (dx / len) * 11.5; ball.vy = (dy / len) * 11.5; }
                    }
                }
            });
            constrainBoundaryPhysics(ball);
        }

        function checkAndResolveCirclePhysics(d1, d2) {
            let dx = d2.x - d1.x; let dy = d2.y - d1.y; let dist = Math.hypot(dx, dy); let minDist = d1.radius + d2.radius;
            if (dist < minDist && dist > 0) {
                let overlap = minDist - dist; let nx = dx / dist; let ny = dy / dist;
                let sep = d1.isBall || d2.isBall ? 1.0 : 0.5;
                if (!d1.isBall) { d1.x -= nx * overlap * sep; d1.y -= ny * overlap * sep; }
                if (!d2.isBall) { d2.x += nx * overlap * sep; d2.y += ny * overlap * sep; }
                
                let impulse = 2 * (nx * (d1.vx - d2.vx) + ny * (d1.vy - d2.vy)) / (d1.mass + d2.mass);
                d1.vx -= impulse * d2.mass * nx; d1.vy -= impulse * d2.mass * ny;
                d2.vx += impulse * d1.mass * nx; d2.vy += impulse * d1.mass * ny;
                
                if (d1.isBall && !d2.isBall) d1.lastTouch = d2;
                else if (d2.isBall && !d1.isBall) d2.lastTouch = d1;
                return true;
            }
            return false;
        }

        function constrainBoundaryPhysics(obj) {
            const r = obj.radius;
            let hitGoalLeft = (obj.x - r <= 0 && obj.y > map.goalY1 && obj.y < map.goalY2);
            let hitGoalRight = (obj.x + r >= map.width && obj.y > map.goalY1 && obj.y < map.goalY2);
            
            if (hitGoalLeft) {
                if (obj.x - r < -map.goalDepth) { obj.x = -map.goalDepth + r; obj.vx *= -0.25; }
                if (obj.y - r < map.goalY1 || obj.y + r > map.goalY2) obj.vy *= -0.25; return;
            }
            if (hitGoalRight) {
                if (obj.x + r > map.width + map.goalDepth) { obj.x = map.width + map.goalDepth - r; obj.vx *= -0.25; }
                if (obj.y - r < map.goalY1 || obj.y + r > map.goalY2) obj.vy *= -0.25; return;
            }
            if (obj.x - r < 0) { obj.x = r; obj.vx *= -0.6; }
            if (obj.x + r > map.width) { obj.x = map.width - r; obj.vx *= -0.6; }
            if (obj.y - r < 0) { obj.y = r; obj.vy *= -0.6; }
            if (obj.y + r > map.height) { obj.y = map.height - r; obj.vy *= -0.6; }
        }

        /* RENDERING */
        function processRenderFrame() {
            if (gameState === "playing" || gameState === "goal" || gameState === "postmatch") {
                
                // Track active client for camera
                let activeUserControlledDisc;
                if (isHost || !isMultiplayer) {
                    activeUserControlledDisc = players.find(p => p.isLocalHuman);
                } else {
                    activeUserControlledDisc = players.find(p => p.clientId === myUid);
                }
                
                // Advanced Camera Modes
                if (activeUserControlledDisc) {
                    camera.zoom = 0.55; 
                    camera.x = Math.max(-600, Math.min(map.width + 600 - (canvas.width / camera.zoom), activeUserControlledDisc.x - (canvas.width / camera.zoom) / 2));
                    camera.y = Math.max(-600, Math.min(map.height + 600 - (canvas.height / camera.zoom), activeUserControlledDisc.y - (canvas.height / camera.zoom) / 2));
                } else {
                    let myRole = document.getElementById('sp-role').value; // fallback
                    if (spectatorCamMode === "full") {
                        let zoomX = canvas.width / (map.width + 200);
                        let zoomY = canvas.height / (map.height + 200);
                        camera.zoom = Math.min(zoomX, zoomY);
                        camera.x = (map.width / 2) - (canvas.width / camera.zoom) / 2;
                        camera.y = (map.height / 2) - (canvas.height / camera.zoom) / 2;
                    } else {
                        camera.zoom = 0.55;
                        camera.x = Math.max(-600, Math.min(map.width + 600 - (canvas.width / camera.zoom), ball.x - (canvas.width / camera.zoom) / 2));
                        camera.y = Math.max(-600, Math.min(map.height + 600 - (canvas.height / camera.zoom), ball.y - (canvas.height / camera.zoom) / 2));
                    }
                }

                ctx.fillStyle = '#080c09'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.save(); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
                
                ctx.fillStyle = '#111813'; ctx.fillRect(-2000, -2000, map.width + 4000, map.height + 4000);
                ctx.fillStyle = '#27ae60'; ctx.fillRect(-1000, -1000, map.width + 2000, map.height + 2000); 
                
                ctx.fillStyle = '#2ecc71';
                for (let xCoord = -1000; xCoord < map.width + 1000; xCoord += 150) {
                    if ((Math.abs(xCoord) / 150) % 2 === 0) ctx.fillRect(xCoord, -1000, 75, map.height + 2000);
                }

                ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 6; ctx.strokeRect(0, 0, map.width, map.height);
                ctx.beginPath(); ctx.arc(map.width / 2, map.height / 2, 130, 0, Math.PI * 2); ctx.moveTo(map.width / 2, 0); ctx.lineTo(map.width / 2, map.height); ctx.stroke();
                
                ctx.strokeRect(0, map.height/2 - 250, 250, 500); ctx.strokeRect(map.width - 250, map.height/2 - 250, 250, 500);
                ctx.strokeRect(0, map.goalY1 - 50, 100, map.goalY2 - map.goalY1 + 100); ctx.strokeRect(map.width - 100, map.goalY1 - 50, 100, map.goalY2 - map.goalY1 + 100);

                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.fillRect(-map.goalDepth, map.goalY1, map.goalDepth, map.goalY2 - map.goalY1); ctx.strokeRect(-map.goalDepth, map.goalY1, map.goalDepth, map.goalY2 - map.goalY1);
                ctx.fillRect(map.width, map.goalY1, map.goalDepth, map.goalY2 - map.goalY1); ctx.strokeRect(map.width, map.goalY1, map.goalDepth, map.goalY2 - map.goalY1);

                if (Math.hypot(ball.vx, ball.vy) > 10) { powerTrail.push({ x: ball.x, y: ball.y }); if (powerTrail.length > 12) powerTrail.shift(); } else powerTrail = [];
                powerTrail.forEach((t, i) => { ctx.beginPath(); ctx.arc(t.x, t.y, ball.radius * (i / powerTrail.length), 0, Math.PI * 2); ctx.fillStyle = `rgba(241, 196, 15, ${(i / powerTrail.length) * 0.4})`; ctx.fill(); });

                players.forEach(p => {
                    ctx.save(); ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 8; ctx.shadowOffsetY = 6;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
                    
                    // Highlight active player
                    let isMe = (isHost && p.isLocalHuman) || (!isHost && p.clientId === myUid);
                    ctx.lineWidth = 4; ctx.strokeStyle = isMe ? "#f1c40f" : "#ffffff"; ctx.stroke();
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * 0.45, 0, Math.PI * 2); 
                    ctx.fillStyle = p.teamId === 1 ? CONFIG.p1Team.secondary : CONFIG.p2Team.secondary; 
                    ctx.fill();

                    // RENDER MULTIPLAYER & BOT NAMES
                    ctx.fillStyle = "#ffffff"; ctx.font = "900 13px sans-serif"; ctx.textAlign = "center";
                    ctx.shadowColor = "black"; ctx.shadowBlur = 4;
                    ctx.fillText(p.playerName, p.x, p.y - p.radius - 10);
                    if (isMe) { ctx.fillStyle = "#f1c40f"; ctx.fillText("▼", p.x, p.y - p.radius - 24); }
                    ctx.shadowBlur = 0;
                });

                ctx.save(); ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10; ctx.shadowOffsetY = 5;
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fillStyle = ball.color; ctx.fill(); ctx.restore();
                ctx.lineWidth = 3; ctx.strokeStyle = "#222222"; ctx.stroke();
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius * 0.5, 0, Math.PI * 2); ctx.fillStyle = "#333333"; ctx.fill(); ctx.restore();

                let viewportW = canvas.width / camera.zoom; let viewportH = canvas.height / camera.zoom;
                if ((ball.x < camera.x || ball.x > camera.x + viewportW || ball.y < camera.y || ball.y > camera.y + viewportH) && activeUserControlledDisc) {
                    let arrowX = Math.max(60, Math.min(canvas.width - 60, (ball.x - camera.x) * camera.zoom));
                    let arrowY = Math.max(60, Math.min(canvas.height - 60, (ball.y - camera.y) * camera.zoom));
                    
                    ctx.save(); ctx.translate(arrowX, arrowY); ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fillStyle = "rgba(20, 30, 24, 0.9)"; ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.fill(); ctx.stroke();
                    ctx.rotate(Math.atan2(ball.y - activeUserControlledDisc.y, ball.x - activeUserControlledDisc.x));
                    ctx.beginPath(); ctx.moveTo(14, 0); ctx.lineTo(-8, -10); ctx.lineTo(-4, 0); ctx.lineTo(-8, 10); ctx.closePath(); ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.restore();
                }

                if (gameState === "goal") {
                    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, canvas.height / 2 - 60, canvas.width, 120);
                    ctx.fillStyle = "#f1c40f"; ctx.font = "italic 900 45px sans-serif"; ctx.textAlign = "center"; ctx.shadowColor = "#e67e22"; ctx.shadowBlur = 15;
                    ctx.fillText(alertText, canvas.width / 2, canvas.height / 2 + 15); ctx.shadowBlur = 0;
                }
                advanceSystemSimulationLogic();
            }
            requestAnimationFrame(processRenderFrame);
        }

        /* CLOCK & LOGIC ENGINE */
        function advanceSystemSimulationLogic() {
            if (gameState === "playing") {
                
                // Read PC Input if touch joystick isn't active
                if (!joyActive && (!document.activeElement || document.activeElement.tagName !== "INPUT")) {
                    let kx = 0, ky = 0;
                    if (keys.w || keys.arrowup) ky -= 1;
                    if (keys.s || keys.arrowdown) ky += 1;
                    if (keys.a || keys.arrowleft) kx -= 1;
                    if (keys.d || keys.arrowright) kx += 1;
                    
                    let kLen = Math.hypot(kx, ky);
                    if (kLen > 0) { inputVector.x = kx / kLen; inputVector.y = ky / kLen; } 
                    else { inputVector.x = 0; inputVector.y = 0; }
                }

                if (isHost || !isMultiplayer) {
                    
                    // Host local Input
                    let p1Node = players.find(p => p.isLocalHuman);
                    if (p1Node) {
                        let nLen = Math.hypot(inputVector.x, inputVector.y);
                        let tgtX = (nLen > 1 ? inputVector.x/nLen : inputVector.x);
                        let tgtY = (nLen > 1 ? inputVector.y/nLen : inputVector.y);
                        p1Node.vx += tgtX * p1Node.speed; p1Node.vy += tgtY * p1Node.speed;
                    }
                    
                    // Remote clients inputs mapping
                    if (isMultiplayer) {
                        players.forEach(p => {
                            if (!p.isAI && p.clientId && p.remoteInput && p.clientId !== "host") {
                                let rLen = Math.hypot(p.remoteInput.x, p.remoteInput.y);
                                let rTgtX = rLen > 1.0 ? p.remoteInput.x/rLen : p.remoteInput.x;
                                let rTgtY = rLen > 1.0 ? p.remoteInput.y/rLen : p.remoteInput.y;
                                p.vx += rTgtX * p.speed; p.vy += rTgtY * p.speed;
                            }
                        });
                    }

                    executeHumanizedAI(); ball.update(); players.forEach(pl => pl.update()); resolveComplexCollisions();

                    if (ball.x < 0 && ball.y > map.goalY1 && ball.y < map.goalY2) processGoalEventSequence(2);
                    else if (ball.x > map.width && ball.y > map.goalY1 && ball.y < map.goalY2) processGoalEventSequence(1);

                    matchTimer += 16.67;
                    let elapsed = Math.floor(matchTimer / 1000);
                    
                    if (CONFIG.timeLimit && CONFIG.timeLimit > 0 && Math.max(0, CONFIG.timeLimit - elapsed) === 0) {
                        gameState = "postmatch"; showPostMatchScreen(true);
                    }
                    if (isMultiplayer && roomRef && (Date.now() - lastStatePush > 33)) {
                        roomRef.child('state').set(serializeState()); lastStatePush = Date.now();
                    }
                } else if (isMultiplayer && !isHost) {
                    if (roomRef && (Date.now() - lastInputPush > 33)) { 
                        roomRef.child(`clients/${myUid}/input`).set(inputVector); 
                        lastInputPush = Date.now(); 
                    }
                    ball.x += (ball.targetX - ball.x) * 0.3; ball.y += (ball.targetY - ball.y) * 0.3;
                    players.forEach(p => { p.x += (p.targetX - p.x) * 0.3; p.y += (p.targetY - p.y) * 0.3; });
                }

                let elapsed = Math.floor(matchTimer / 1000); let disp = elapsed;
                if (CONFIG.timeLimit && CONFIG.timeLimit > 0) disp = Math.max(0, CONFIG.timeLimit - elapsed);
                document.getElementById('hud-timer').textContent = `${Math.floor(disp / 60).toString().padStart(2, '0')}:${(disp % 60).toString().padStart(2, '0')}`;
                if (dashCooldown > 0) document.getElementById('cooldown-dash').style.height = `${(--dashCooldown / 150) * 100}%`;
                if (powerCooldown > 0) document.getElementById('cooldown-power').style.height = `${(--powerCooldown / 220) * 100}%`;
                
            } else if (gameState === "goal") {
                if (isHost || !isMultiplayer) {
                    ball.update(); players.forEach(pl => pl.update());
                    if (--alertTimer <= 0) { resetFieldToKickoffPositions(); gameState = "playing"; }
                    if (isMultiplayer && roomRef && (Date.now() - lastStatePush > 33)) { roomRef.child('state').set(serializeState()); lastStatePush = Date.now(); }
                } else if (isMultiplayer && !isHost) {
                    ball.x += (ball.targetX - ball.x) * 0.3; ball.y += (ball.targetY - ball.y) * 0.3;
                    players.forEach(p => { p.x += (p.targetX - p.x) * 0.3; p.y += (p.targetY - p.y) * 0.3; });
                }
            } else if (gameState === "postmatch" && (!isHost && isMultiplayer)) {
                ball.x += (ball.targetX - ball.x) * 0.3; ball.y += (ball.targetY - ball.y) * 0.3;
                players.forEach(p => { p.x += (p.targetX - p.x) * 0.3; p.y += (p.targetY - p.y) * 0.3; });
            }
        }

        function processGoalEventSequence(winningFactionID) {
            gameState = "goal"; alertTimer = 160;
            if (winningFactionID === 1) { scores.p1++; alertText = `${CONFIG.p1Team.name.toUpperCase()} SCORES!`; } 
            else { scores.p2++; alertText = `${CONFIG.p2Team.name.toUpperCase()} SCORES!`; }
            
            if(ball.lastTouch) ball.lastTouch.stats.goals++;

            document.getElementById('hud-p1-score').textContent = scores.p1;
            document.getElementById('hud-p2-score').textContent = scores.p2;
        }

        function resetFieldToKickoffPositions() {
            powerShotActive = false; ball.x = map.width / 2; ball.y = map.height / 2; ball.targetX = ball.x; ball.targetY = ball.y; ball.vx = 0; ball.vy = 0; ball.lastTouch = null;
            players.forEach(p => { p.x = p.homeX; p.y = p.homeY; p.targetX = p.x; p.targetY = p.y; p.vx = 0; p.vy = 0; p.reactionBuffer = []; p.stamina = 1.0; });
        }

        /* =========================================================================
           POST MATCH STATS & REMATCH LOGIC
           ========================================================================= */
        function showPostMatchScreen(isHostBroadcast) {
            document.getElementById('post-match-screen').classList.remove('hidden');
            document.getElementById('post-match-score').textContent = `${scores.p1} - ${scores.p2}`;
            
            if (isMultiplayer && isHost && isHostBroadcast) {
                let finalStats = players.map(p => ({ name: p.playerName, teamId: p.teamId, goals: p.stats.goals }));
                roomRef.child('finalStats').set(finalStats);
                renderStatsTable(finalStats);
            } else if (!isMultiplayer) {
                let localStats = players.map(p => ({ name: p.playerName, teamId: p.teamId, goals: p.stats.goals }));
                renderStatsTable(localStats);
            }

            document.getElementById('rematch-btn').textContent = "Rematch";
            document.getElementById('rematch-btn').disabled = false;
        }

        function renderStatsTable(statsArray) {
            let sorted = statsArray.sort((a,b) => b.goals - a.goals);
            document.getElementById('stats-tbody').innerHTML = sorted.map(s => 
                `<tr><td>${s.name}</td><td>${s.teamId === 1 ? CONFIG.p1Team.name : CONFIG.p2Team.name}</td><td style="color:#f1c40f; font-weight:bold;">${s.goals}</td></tr>`
            ).join('');
        }

        // Rematch Request Handlers
        document.getElementById('rematch-btn').addEventListener('click', () => {
            if (!isMultiplayer) { resetMatchForRematch(); return; }
            if (isHost) roomRef.child('rematch/p1').set(true); else roomRef.child('rematch/p2').set(true);
            document.getElementById('rematch-btn').textContent = "Requesting..."; document.getElementById('rematch-btn').disabled = true;
        });

        function setupRematchListener() {
            if (!roomRef) return;
            roomRef.child('finalStats').on('value', snap => {
                if (snap.exists() && gameState === "postmatch" && !isHost) renderStatsTable(snap.val());
            });
            roomRef.child('rematch').on('value', snap => {
                if (!snap.exists()) return;
                let data = snap.val();
                if (data.p1 && data.p2) {
                    if (isHost) roomRef.child('rematch').remove(); 
                    resetMatchForRematch();
                } else if ((isHost && data.p2 && !data.p1) || (!isHost && data.p1 && !data.p2)) {
                    document.getElementById('rematch-btn').textContent = "Accept Rematch?";
                    document.getElementById('rematch-btn').style.background = "linear-gradient(135deg, #e67e22 0%, #d35400 100%)";
                }
            });
        }

        function resetMatchForRematch() {
            document.getElementById('post-match-screen').classList.add('hidden');
            resetFieldToKickoffPositions();
            scores = { p1: 0, p2: 0 }; matchTimer = 0;
            players.forEach(p => p.stats.goals = 0);
            gameState = "playing";
        }

        /* ACTIONS */
        function triggerBurstDashMechanic() {
            if (dashCooldown > 0) return;
            dashCooldown = 150; 
            if (!isHost && isMultiplayer && roomRef) { 
                roomRef.child(`clients/${myUid}/actions`).push({action: 'dash', vector: inputVector, t: Date.now()}); 
                return; 
            }
            let pNode = players.find(p => p.isLocalHuman); if (!pNode) return;
            let nLen = Math.hypot(inputVector.x, inputVector.y);
            if (nLen > 0) { pNode.vx += (inputVector.x / nLen) * 11.5; pNode.vy += (inputVector.y / nLen) * 11.5; }
        }
        function triggerKickState() {
            if (!isHost && isMultiplayer && roomRef) { 
                roomRef.child(`clients/${myUid}/actions`).push({action: 'kick', vector: null, t: Date.now()}); 
                return; 
            }
            kickIntent = true; setTimeout(() => kickIntent = false, 160);
        }
        function chargeReleasePowerState() {
            if (powerCooldown > 0) return; powerCooldown = 220; 
            if (!isHost && isMultiplayer && roomRef) { 
                roomRef.child(`clients/${myUid}/actions`).push({action: 'power', vector: null, t: Date.now()}); 
                return; 
            }
            powerShotActive = true;
        }

        /* TOUCH CONTROLS SETUP */
        const joyZone = document.getElementById('joystick-zone'); const joyStick = document.getElementById('joystick-stick');
        joyZone.addEventListener('pointerdown', e => { if (joyActive) return; joystickTouchId = e.pointerId; joyActive = true; computeStick(e); joyZone.setPointerCapture(e.pointerId); e.preventDefault(); });
        joyZone.addEventListener('pointermove', e => { if (!joyActive || e.pointerId !== joystickTouchId) return; computeStick(e); });
        const releaseJoy = e => { if (!joyActive || e.pointerId !== joystickTouchId) return; joyActive = false; joystickTouchId = null; joyStick.style.transform = 'translate(0px, 0px)'; inputVector = { x: 0, y: 0 }; };
        joyZone.addEventListener('pointerup', releaseJoy); joyZone.addEventListener('pointercancel', releaseJoy);
        
        function computeStick(touchData) {
            let rect = joyZone.getBoundingClientRect(); 
            let dX = touchData.clientX - (rect.left + rect.width / 2); 
            let dY = touchData.clientY - (rect.top + rect.height / 2);
            
            // Adjust radius threshold mapping based on resized boundaries
            let maxRadius = joyZone.offsetWidth / 2 - 10;
            let dLen = Math.hypot(dX, dY); 
            if (dLen > maxRadius) { dX = (dX / dLen) * maxRadius; dY = (dY / dLen) * maxRadius; }
            
            joyStick.style.transform = `translate(${dX}px, ${dY}px)`; 
            inputVector.x = dX / maxRadius; inputVector.y = dY / maxRadius;
        }
        
        const attachBtn = (id, cb) => document.getElementById(id).addEventListener('pointerdown', e => { e.stopPropagation(); e.preventDefault(); cb(); });
        attachBtn('btn-dash', triggerBurstDashMechanic); attachBtn('btn-shoot', triggerKickState); attachBtn('btn-power', chargeReleasePowerState);

        /* INITIALIZATIONS */
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 50; });
        window.dispatchEvent(new Event('resize'));

        // Offline Match Start
        document.getElementById('btn-start-sp').addEventListener('click', () => {
            isMultiplayer = false;
            CONFIG.p1Team = TEAMS.find(t => t.id === document.getElementById('sp-p1-team').value);
            CONFIG.p2Team = TEAMS.find(t => t.id === document.getElementById('sp-p2-team').value);
            CONFIG.fieldSize = document.getElementById('sp-field-size').value;
            CONFIG.difficulty = document.getElementById('sp-difficulty').value;
            CONFIG.teamSize = parseInt(document.getElementById('sp-team-size').value);
            CONFIG.botCountSetting = "auto";
            CONFIG.timeLimit = parseInt(document.getElementById('sp-time-limit').value);
            CONFIG.p1Role = document.getElementById('sp-role').value;
            CONFIG.p1Name = "Player";
            CONFIG.p2Name = "Bot";
            startMatch(false);
        });

        function startMatch(networked = false) {
            document.getElementById('hud-p1-flag').style.backgroundColor = CONFIG.p1Team.bg;
            document.getElementById('hud-p2-flag').style.backgroundColor = CONFIG.p2Team.bg;
            
            if (isHost || !isMultiplayer) buildTacticalLineups();
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');

            let roleSelected = document.getElementById(isMultiplayer ? 'mp-role' : 'sp-role').value;
            if (roleSelected === "spectator") {
                document.getElementById('spectator-ui').classList.remove('hidden');
                document.getElementById('controls-container').classList.add('hidden');
            } else {
                document.getElementById('spectator-ui').classList.add('hidden');
                document.getElementById('controls-container').classList.remove('hidden');
            }
            
            if (isMultiplayer) {
                initChatListener();
            }
            gameState = "playing";
        }

        document.getElementById('pause-btn').addEventListener('click', () => { 
            gameState = isMultiplayer && !isHost ? "playing" : "paused"; 
            document.getElementById('pause-screen').classList.remove('hidden'); 
        });
        document.getElementById('resume-btn').addEventListener('click', () => { gameState = "playing"; document.getElementById('pause-screen').classList.add('hidden'); });

        requestAnimationFrame(processRenderFrame);
    </script>
</body>
</html>
